<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulário de inscrição - Senai</title>
    <link rel="stylesheet" href="styles.css" />

    <meta name="description" content="Tela de acesso ao sistema de cadastro do SENAI." />

  </head>
  <body>
    <form action="confirmacao.html" class="inscricao">
      <h2>Inscrição SENAI</h2>

      <div class="grupo">
        <label for="nome">Nome completo:</label><br />
        <input type="text" name="Nome" id="nome" required /><br />
      </div>

      <div class="grupo">
        <label for="email-inscricao">E-mail:</label><br />
        <input type="email" name="email" id="email-inscricao" required /><br />
      </div>
      <div class="grupo">
        <label for="telefone">Telefone:</label><br />
        <input type="text" name="telefone" id="telefone" required /><br />
      </div>

      <div class="grupo">
        <label for="curso">Curso desejado: </label><br />
        <select name="curso" id="curso" required>
          <option value="">Selecione...</option>
          <option value="desenvolvimento">
            Técnico em Desenvolvimento de Sistemas
          </option>
          <option value="automacao">Técnico em Automação Industrial</option>
          <option value="informatica">Técnico em Informática</option>
          <option value="redes">Técnico em Redes de Computadores</option>
          <option value="jogos">
            Técnico em Programação de Jogos Digitais
          </option>
        </select>
      </div>
      <br />
      <div class="grupo">
        <label for="observacao">Observações:</label><br />
        <textarea name="observacao" id="observacao" required></textarea><br />
      </div>
      <button class="btn-front" type="submit">Enviar inscrição</button><br />
      <a href="enriquecimento.html">Já sou aluno!</a>
    </form>
  </body>
</html>
