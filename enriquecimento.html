<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SENAI - Enriquecimento de Cadastro</title>
    <link rel="stylesheet" href="styles.css" />

    <meta name="description" content="Formulário para enriquecimento de dados cadastrais." />

  </head>
  <body class="formulario">
    <form action="confirmacao.html" class="dados-enriquecimento">
      <h1>Enriquecimento do Cadastro com:</h1>

      <fieldset class="cadastro-grupo">
        <legend>Dados Pessoais</legend>

        <div class="campo-enr">
          <label for="nomeenr">Nome completo:</label>
          <input type="text" name="nomeenr" id="nomeenr" required />
        </div>

        <div class="campo-enr">
          <label for="nascimento">Data de Nascimento:</label>
          <input type="date" id="nascimento" name="nascimento" required />
        </div>

        <div class="campo-enr">
          <label for="rg">RG:</label>
          <input type="text" id="rg" name="rg" required />
        </div>

        <div class="campo-enr">
          <label for="cpf">CPF:</label>
          <input type="text" id="cpf" name="cpf" required />
        </div>

        <div class="campo-enr">
          <label for="genero">Gênero:</label>
          <select name="genero" id="genero" required>
            <option value="">Selecione...</option>
            <option value="Feminino">Feminino</option>
            <option value="Masculino">Masculino</option>
            <option value="nb">Não-binário</option>
            <option value="outro">Outro</option>
            <option value="pnr">Prefiro não responder</option>
          </select>
        </div>
      </fieldset>

      <fieldset class="cadastro-grupo">
        <legend>Endereço Completo</legend>

        <div class="campo-end">
          <label for="rua">Logradouro:</label>
          <input type="text" name="rua" id="rua" required />
        </div>

        <div class="campo-end">
          <label for="numero">Número:</label>
          <input type="text" name="numero" id="numero" required />
        </div>

        <div class="campo-end">
          <label for="complemento">Complemento:</label>
          <input type="text" name="complemento" id="complemento" />
        </div>

        <div class="campo-end">
          <label for="bairro">Bairro:</label>
          <input type="text" name="bairro" id="bairro" required />
        </div>

        <div class="campo-end">
          <label for="cidade">Cidade:</label>
          <input type="text" name="cidade" id="cidade" required />
        </div>

        <div class="campo-end">
          <label for="cep">CEP:</label>
          <input type="text" name="cep" id="cep" required />
        </div>

        <div class="campo-end">
          <label for="estado">Estado</label>
          <select name="estado" id="estado" required>
            <option value="">Selecione...</option>
            <option value="AC">AC</option>
            <option value="AL">AL</option>
            <option value="AM">AM</option>
            <option value="AP">AP</option>
            <option value="BA">BA</option>
            <option value="CE">CE</option>
            <option value="DF">DF</option>
            <option value="ES">ES</option>
            <option value="GO">GO</option>
            <option value="MA">MA</option>
            <option value="MG">MG</option>
            <option value="MS">MS</option>
            <option value="MT">MT</option>
            <option value="PA">PA</option>
            <option value="PB">PB</option>
            <option value="PE">PE</option>
            <option value="PI">PI</option>
            <option value="PR">PR</option>
            <option value="RJ">RJ</option>
            <option value="RN">RN</option>
            <option value="RO">RO</option>
            <option value="RR">RR</option>
            <option value="RS">RS</option>
            <option value="SC">SC</option>
            <option value="SE">SE</option>
            <option value="SP">SP</option>
            <option value="TO">TO</option>
          </select>
        </div>
      </fieldset>

      <fieldset class="cadastro-grupo">
        <legend>Contato</legend>

        <div class="contato">
          <label for="fone">Telefone/Celular:</label>
          <input type="text" id="fone" name="fone" required />
        </div>

        <div class="contato">
          <label for="wpp">Whatsapp:</label>
          <input type="text" id="wpp" name="wpp" required />
        </div>

        <div class="contato">
          <label for="email-enri">Email:</label>
          <input type="email" id="email" name="email-enri" required />
        </div>

        <div class="contato">
          <label for="linkedin">LinkedIn:</label>
          <input type="text" id="linkedin" name="linkedin" required />
        </div>
      </fieldset>

      <fieldset class="cadastro-grupo">
        <legend>Outras informações</legend>

        <div class="campo-opcao">
          <span class="titulo-campo">Possui CNH?</span>
          <input type="radio" name="cnh_possui" id="cnh-sim" value="sim" />
          <label for="cnh-sim">sim</label>

          <input type="radio" name="cnh_possui" id="cnh-nao" value="nao" />
          <label for="cnh-nao">nao</label>
        </div>

        <div class="campo-opcao">
          <span class="titulo-campo">Se sim, qual tipo?</span>

          <input type="checkbox" name="categoria_cnh" id="cnh-a" value="A" />
          <label for="cnh-a">A</label>

          <input type="checkbox" name="categoria_cnh" id="cnh-b" value="B" />
          <label for="cnh-b">B</label>

          <input type="checkbox" name="categoria_cnh" id="cnh-c" value="C" />
          <label for="cnh-c">C</label>

          <input type="checkbox" name="categoria_cnh" id="cnh-d" value="D" />
          <label for="cnh-d">D</label>

          <input type="checkbox" name="categoria_cnh" id="cnh-e" value="E" />
          <label for="cnh-e">E</label>
        </div>

        <div class="campo-enr">
          <label for="tipo-sanguineo">Tipo sanguíneo</label>
          <select id="tipo-sanguineo" name="tipo_sanguineo" required>
            <option value="">Selecione...</option>
            <option value="A+">A+</option>
            <option value="B+">B+</option>
            <option value="AB+">AB+</option>
            <option value="O+">O+</option>
            <option value="A-">A-</option>
            <option value="B-">B-</option>
            <option value="AB-">AB-</option>
            <option value="O-">O-</option>
          </select>
        </div>

        <div class="campo-opcao">
          <span class="titulo-campo">CPD (Deficiência) ?</span>

          <input type="radio" id="cpd-sim" name="cpd" value="sim" />
          <label for="cpd-sim">Sim</label>

          <input type="radio" id="cpd-nao" name="cpd" value="nao" />
          <label for="cpd-nao">Não</label>
        </div>
      </fieldset>
      <div class="btn-end">
      <button type="submit" class="enviar">Enviar</button>
      <button type="reset" class="reset">Cancelar</button>
      <button class="voltar" onclick="location.href='index.html'">
        Voltar
      </button>
      </div>
    </form>
  </body>
</html>
